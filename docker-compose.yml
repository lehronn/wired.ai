version: '3.8'

services:
  wired-ai-chat:
    build: .
    image: wired-ai:latest
    container_name: wired-ai-chat
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - APP_PASSWORD=sezam
      - REQUIRE_AUTH=false
      - LLM_HOST=http://192.168.15.15:1234
    # Wyłączono wolumeny kodu, aby uniknąć konfliktów uprawnień Synology ACL i zapewnić stabilność paczek z obrazu.
    # volumes:
    #   - .:/app
    #   - /app/node_modules
