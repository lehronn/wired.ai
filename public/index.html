<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wired AI: One</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="login-overlay" class="d-none">
        <div class="glass-card login-card text-center">
            <h1 class="mb-4">Wired AI</h1>
            <p class="text-muted mb-4" id="login-msg">Wprowadź hasło, aby kontynuować</p>
            <form id="login-form">
                <input type="password" id="auth-input" class="form-control mb-3 glass-input" placeholder="Hasło...">
                <button type="submit" class="btn btn-primary w-100 py-2">Wejdź</button>
            </form>
            <div id="login-error" class="text-danger mt-3 small d-none">Błędne hasło.</div>
        </div>
    </div>

    <div id="app-container" class="d-flex flex-column">
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg glass-nav mb-3 sticky-top">
            <div class="container-fluid px-3 px-md-4">
                <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                    <div class="brand-bolt"><i class="bi bi-cpu-fill"></i></div>
                    <span class="fw-bold">Wired AI</span>
                    <span class="badge rounded-pill status-badge" id="ai-status">
                        <span class="status-dot me-1"></span>
                        <span id="ai-status-text">Sprawdzanie...</span>
                    </span>
                </a>
                
                <div class="d-flex align-items-center gap-3 ms-auto">
                    <button class="btn btn-sm btn-glass-icon position-relative" id="system-prompt-btn" title="Ustawienia">
                        <i class="bi bi-gear-fill"></i>
                        <!-- Dot for settings notification if needed -->
                    </button>
                    
                    <div class="dropdown">
                        <button class="btn btn-sm btn-glass-icon" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end glass-dropdown">
                            <li><a class="dropdown-item" href="#" id="clear-history-btn"><i class="bi bi-trash3 me-2"></i>Wyczyść czat</a></li>
                            <li><a class="dropdown-item" href="#" id="export-btn"><i class="bi bi-download me-2"></i>Eksportuj JSON</a></li>
                            <li><hr class="dropdown-divider border-secondary opacity-25"></li>
                            <li><h6 class="dropdown-header small text-muted">Motyw</h6></li>
                            <li><a class="dropdown-item theme-link" href="#" data-theme="dark">Ciemny</a></li>
                            <li><a class="dropdown-item theme-link" href="#" data-theme="light">Jasny</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Message Stream -->
        <main class="container-fluid flex-grow-1 chat-stream overflow-auto px-2 px-md-5">
            <div id="messages-wrapper" class="py-3">
                <!-- Messages populated here -->
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-section sticky-bottom py-3 py-md-4">
            <div class="container-fluid px-3 px-md-5 position-relative">
                <!-- Offline Warning -->
                <div id="offline-warning" class="glass-panel offline-banner mb-3 d-none">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span id="offline-msg">Usługa tymczasowo niedostępna — brak połączenia z serwerem AI.</span>
                </div>

                <div id="image-preview-container" class="mb-2 d-none d-flex flex-wrap gap-2">
                    <!-- Thumbnails will be injected here via JS -->
                </div>

                <div class="input-wrapper glass-panel p-2 d-flex align-items-end gap-2 shadow-lg" id="input-container">
                    <input type="file" id="image-upload" accept="image/*" multiple class="d-none">
                    <button id="upload-btn" class="btn btn-link text-muted p-1 mb-1">
                        <i class="bi bi-images fs-5"></i>
                    </button>
                    <textarea id="message-input" class="form-control border-0 bg-transparent" placeholder="Zadaj pytanie..." rows="1"></textarea>
                    <button id="send-btn" class="btn btn-primary rounded-circle send-btn">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- System Prompt Modal -->
    <div class="modal fade" id="prompt-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold"><i class="bi bi-sliders2-vertical me-2"></i><span id="modal-title-text">Ustawienia</span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Model Selection -->
                    <div class="mb-4">
                        <label class="form-label small text-muted fw-bold mb-2 text-uppercase" id="lbl-model">Model AI</label>
                        <select id="model-selector" class="form-select glass-select w-100">
                            <option id="opt-select-model">Wybierz model...</option>
                        </select>
                    </div>

                    <!-- Language Selection -->
                    <div class="mb-4">
                        <label class="form-label small text-muted fw-bold mb-2 text-uppercase" id="lbl-lang">Język Interfejsu</label>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-secondary glass-btn-toggle flex-grow-1" id="lang-pl">Polski</button>
                            <button class="btn btn-outline-secondary glass-btn-toggle flex-grow-1" id="lang-en">English</button>
                        </div>
                    </div>

                    <!-- System Prompt -->
                    <div class="mb-2">
                        <label class="form-label small text-muted fw-bold mb-2 text-uppercase" id="lbl-prompt">Instrukcje Systemowe</label>
                        <textarea id="system-prompt-input" class="form-control glass-input" rows="4" placeholder="Np. 'Zawsze odpowiadaj po polsku'"></textarea>
                    </div>
                    
                    <div class="text-center mt-4 pt-2">
                        <small class="text-muted opacity-25" style="font-size: 0.65rem;" id="chat-info">Wired AI One — Napędzane przez LM Studio / Synology</small>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary px-4" id="reset-prompt-btn">Reset</button>
                    <button type="button" class="btn btn-primary px-4" id="save-prompt-btn">Zapisz</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
